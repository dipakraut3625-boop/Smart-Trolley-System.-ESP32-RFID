<!DOCTYPE html>
<html>
<head>
  <title>Test Create Bill</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    button {
      padding: 10px 20px;
      font-size: 18px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>

<h1>Test Create Bill</h1>

<button onclick="createBill()">Create Bill</button>

<div id="result"></div>

<script>
async function createBill() {

  const result = document.getElementById("result");
  result.innerText = "⏳ Creating bill...";

  try {

    const response = await fetch("/api/create-bill", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        items: [
          { name: "Milk", qty: 1, price: 45 },
          { name: "Bread", qty: 2, price: 30 }
        ]
      })
    });

    // ❌ if server error
    if (!response.ok) {
      const text = await response.text();
      console.error("SERVER ERROR:", text);
      result.innerText = "❌ Server Error (check backend)";
      return;
    }

    const data = await response.json();
    console.log("SUCCESS:", data);

    // ❌ safety check
    if (!data.success) {
      result.innerText = "❌ Failed to create bill";
      return;
    }

    // ✅ SUCCESS
    result.innerText = "✅ Bill Created: " + data.billId;

    // 🔥 redirect after 1 sec
    setTimeout(() => {
      window.location.href = data.url;
    }, 1000);

  } catch (err) {
    console.error("FETCH ERROR:", err);
    result.innerText = "❌ Network Error";
  }
}
</script>

</body>
</html>
