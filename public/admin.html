<!DOCTYPE html>
<html>
<head>
  <title>Smart Trolley Dashboard</title>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI';
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      padding: 20px;
    }

    /* CARDS */
    .cards {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      flex: 1;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      padding: 20px;
      text-align: center;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    /* 🛒 TROLLEY */
    .trolley-grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 15px;
      margin-bottom: 25px;
    }

    .trolley-card {
      width: 170px;
      padding: 15px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      transition: 0.3s;
      text-align: center;
    }

    .trolley-card:hover {
      transform: translateY(-5px);
    }

    .active {
      border-left: 4px solid #22c55e;
    }

    .idle {
      border-left: 4px solid #64748b;
    }

    /* 📊 GRAPH SMALL */
    .graph-box {
      width: 100%;
      max-width: 600px;
      margin: auto;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 15px;
    }

    canvas {
      height: 250px !important;
    }

    /* TABLE */
    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
      background: rgba(255,255,255,0.05);
      border-radius: 15px;
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: center;
    }

    th {
      background: rgba(255,255,255,0.1);
    }

    tr:hover {
      background: rgba(255,255,255,0.1);
    }
  </style>
</head>

<body>

<h1>🛒 Smart Trolley Dashboard</h1>

<div class="container">

  <!-- CARDS -->
  <div class="cards">
    <div class="card">
      <h2 id="totalSales">₹0</h2>
      <p>Total Sales</p>
    </div>

    <div class="card">
      <h2 id="billCount">0</h2>
      <p>Total Bills</p>
    </div>
  </div>

  <!-- 🛒 ACTIVE TROLLEYS (MOVED UP) -->
  <h2>🛒 Active Trolleys</h2>
  <div id="trolleyContainer" class="trolley-grid"></div>

  <!-- 📊 SMALL GRAPH -->
  <div class="graph-box">
    <canvas id="chart"></canvas>
  </div>

  <!-- TABLE -->
  <table>
    <thead>
      <tr>
        <th>Bill ID</th>
        <th>Amount</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<script>
const socket = io();
let bills = [];

// 💰 TOTAL
function calculateTotal(bill) {
  let subtotal = 0;
  bill.items.forEach(i => {
    let mart = i.price * 0.95;
    subtotal += mart * i.qty;
  });
  return subtotal + (subtotal * 0.05);
}

// 📊 WEEKLY DATA
function getWeeklyData() {
  let days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  let data = [0,0,0,0,0,0,0];

  bills.forEach(b => {
    let d = new Date(b.time).getDay();
    data[d] += calculateTotal(b);
  });

  return { labels: days, data };
}

let chart;

// 🎨 MAIN RENDER
function render() {
  let totalSales = 0;

  bills.forEach(b => totalSales += calculateTotal(b));

  document.getElementById("totalSales").innerText = "₹" + totalSales.toFixed(2);
  document.getElementById("billCount").innerText = bills.length;

  let html = "";
  bills.slice().reverse().forEach(b => {
    html += `
      <tr>
        <td>${b.id}</td>
        <td>₹${calculateTotal(b).toFixed(2)}</td>
        <td>${new Date(b.time).toLocaleTimeString()}</td>
      </tr>
    `;
  });

  document.getElementById("tableBody").innerHTML = html;

  let weekly = getWeeklyData();

  if (chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"), {
    type: "bar",
    data: {
      labels: weekly.labels,
      datasets: [{
        label: "Weekly Sales",
        data: weekly.data
      }]
    }
  });
}

// 🛒 TROLLEYS
function renderTrolleys(data) {
  let html = "";

  if (Object.keys(data).length === 0) {
    html = "<p>No active trolleys</p>";
  }

  Object.keys(data).forEach(id => {
    let last = new Date(data[id].lastActive);
    let diff = (Date.now() - last) / 1000;
    let active = diff < 30;

    html += `
      <div class="trolley-card ${active ? "active" : "idle"}">
        <h3>🛒 ${id}</h3>
        <p>${active ? "🟢 Active" : "⚪ Idle"}</p>
        <small>${last.toLocaleTimeString()}</small>
      </div>
    `;
  });

  document.getElementById("trolleyContainer").innerHTML = html;
}

// FETCH
fetch("/api/bills")
  .then(res => res.json())
  .then(data => {
    bills = data;
    render();
  });

fetch("/api/trolleys")
  .then(res => res.json())
  .then(data => renderTrolleys(data));

// LIVE
socket.on("new-bill", (bill) => {
  bills.push(bill);
  render();
});

socket.on("trolley-update", (data) => {
  renderTrolleys(data);
});
</script>

</body>
</html>
